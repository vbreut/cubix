<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu Cubix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Cubix</h1>
    <div id="game-board">
        <!-- Plateau de 6x6 pour Cubix -->
        <div class="grid" id="cell-1"></div>
        
        <div class="grid" id="cell-2"></div>
        <div class="square" id="cube2"></div>    
        <div class="grid" id="cell-3"></div>

        <div class="scene">
            <div class="cube">
                <div class="face front">
                    <div class="shape1"></div>
                </div>
                <div class="face back"><div class="shape2"></div></div>
                <div class="face right"><div class="shape3"></div></div>
                <div class="face left"><div class="shape4"></div></div>
                <div class="face top"><div class="shape5"></div></div>
                <div class="face bottom"><div class="shape6"></div></div>
            </div>
        </div>

        <div class="grid" id="cell-4"></div>
        <div class="grid" id="cell-5"></div>
        <div class="grid" id="cell-6"></div>
        <div class="grid" id="cell-7"></div>
        <div class="grid" id="cell-8"></div>
        <div class="grid" id="cell-9"></div>
        <div class="grid" id="cell-10"></div>
        <div class="grid" id="cell-11"></div>
        <div class="grid" id="cell-12"></div>
        <div class="grid" id="cell-13"></div>
        <div class="grid" id="cell-14"></div>
        <div class="grid" id="cell-15"></div>
        <div class="grid" id="cell-16"></div>
        <div class="grid" id="cell-17"></div>
        <div class="grid" id="cell-18"></div>
        <div class="grid" id="cell-19"></div>
        <div class="grid" id="cell-20"></div>
        <div class="grid" id="cell-21"></div>
        <div class="grid" id="cell-22"></div>
        <div class="grid" id="cell-23"></div>
        <div class="grid" id="cell-24"></div>
        <div class="grid" id="cell-25"></div>
        <div class="grid" id="cell-26"></div>
        <div class="grid" id="cell-27"></div>
        <div class="grid" id="cell-28"></div>
        <div class="grid" id="cell-29"></div>
        <div class="grid" id="cell-30"></div>
        <div class="grid" id="cell-31"></div>
        <div class="grid" id="cell-32"></div>
        <div class="grid" id="cell-33"></div>
        <div class="grid" id="cell-34"></div>
        <div class="grid" id="cell-35"></div>
        <div class="grid" id="cell-36"></div>
    </div>


    <script src="script.js"></script>
</body>
</html>
